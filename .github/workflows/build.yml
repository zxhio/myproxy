name: build and release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - published

jobs:
  get-build-info:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.VERSION }}

    steps:
      - name: Get build version
        id: tag
        run: echo "VERSION=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: get-build-info
    env:
      VERSION: ${{ needs.get-build-info.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc

      - name: Build myproxy
        run: |
          mkdir build
          cd build
          cmake ..
          make

      - name: Pack
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd build
          tar czf myproxy-linux-amd64.tar.gz myproxy
          mv myproxy-linux-amd64.tar.gz ..

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ needs.get-build-info.outputs.version }}
          file: myproxy-*.tar.gz
          overwrite: true
          file_glob: true
